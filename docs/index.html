<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devdaar Labs</title>
  <style>
    :root {
      --bg-color: #0b131a;
      --card-bg: #13222d;
      --accent-green: #2ecc71;
      --text-main: #f5f7f8;
      --text-muted: #8fa0a8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Tech-inspired Grid Background */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background-image:
        linear-gradient(rgba(46, 204, 113, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46, 204, 113, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }

    /* Glowing background blobs for a modern tech feel */
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(46, 204, 113, 0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 2rem;
      max-width: 600px;
      width: 100%;
    }

    .logo-wrapper {
      margin-bottom: 2.5rem;
    }

    .logo-wrapper img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.2));
      animation: float 4s ease-in-out infinite;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #ffffff 0%, #a3b8cc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 1.25rem;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 400;
      margin-bottom: 3rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: rgba(46, 204, 113, 0.1);
      border: 1px solid rgba(46, 204, 113, 0.2);
      color: var(--accent-green);
      padding: 0.5rem 1rem;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-green);
      animation: blink 2s infinite;
    }

    footer {
      position: absolute;
      bottom: 2rem;
      z-index: 3;
      font-size: 0.85rem;
      color: rgba(143, 160, 168, 0.5);
      letter-spacing: 0.02em;
    }

    /* Subtle Animations */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }
    }

    /* Mobile Adjustments */
    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      .tagline {
        font-size: 1.1rem;
      }

      .logo-wrapper img {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>

<body>

  <div class="glow"></div>

  <main class="container">
    <div class="badge">
      <span class="badge-dot"></span>
      Stealth Mode
    </div>

    <div class="logo-wrapper">
      <img src="logo.png" alt="Devdaar Labs Logo">
    </div>

    <h1>Devdaar Labs</h1>
    <p class="tagline">In stealth mode, changing how the world builds software.</p>
  </main>

  <footer>
    &copy; 2026 Devdaar Labs. All rights reserved.
  </footer>

</body>

</html>
